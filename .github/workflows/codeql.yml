name: CodeQL

# Advanced setup, not default: CodeQL's Swift autobuild can't build Berthly
# (it needs the Xcode 26 selection, the Metal toolchain download SwiftTerm
# requires, and SPM resolution — the same steps ci.yml does explicitly), so
# Swift runs in manual build mode with those steps mirrored here. Default
# setup must stay disabled in Settings → Advanced Security or uploads from
# this workflow are rejected.

# No pull_request trigger: Swift extraction traces a full Xcode build (~1hr), too slow for
# PR CI, and GitHub can't diff a pull_request-triggered run against a baseline anyway (no
# matching push-triggered analysis on the PR's own commits). Push (every merge) + weekly cron
# give full coverage instead. No branch protection requires this workflow, so nothing blocks.
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 9 * * 1" # weekly: new CodeQL queries land without a code change

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-swift:
    name: Analyze Swift
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
    steps:
      # Pinned to full commit SHAs so a moved tag can't silently change what runs.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Select latest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -n 1)"

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project Berthly.xcodeproj -scheme Berthly

      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: swift
          build-mode: manual

      # EXCLUDED_SOURCE_FILE_NAMES drops SwiftTerm's Metal shader compile
      # entirely: Apple's `metal` is a stub that resolves the downloaded
      # Metal toolchain at runtime, and that lookup fails under CodeQL's
      # build tracer even when the toolchain is present (an untraced
      # prebuild doesn't help — the tracer environment invalidates Xcode's
      # incremental state and the Metal task re-runs traced anyway). The
      # shader library is a runtime resource for SwiftTerm's renderer;
      # nothing here runs the built app, and the extractor only needs the
      # Swift compiles. Verified: a clean build with this exclusion succeeds
      # with no CompileMetalFile task, so no Metal toolchain download either.
      #
      # Concrete `platform=macOS` destination, NOT generic/platform=macOS:
      # generic builds universal (x86_64 + arm64), which doubles the whole
      # tracer-taxed dependency compile — that's what pushed the first run
      # past a 90-minute timeout with the Berthly module still compiling.
      # One architecture is enough for extraction.
      - name: Build
        run: |
          xcodebuild build \
            -project Berthly.xcodeproj \
            -scheme Berthly \
            -destination 'platform=macOS' \
            EXCLUDED_SOURCE_FILE_NAMES='*.metal' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM=

      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:swift"

  analyze-actions:
    name: Analyze workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: actions
          build-mode: none

      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:actions"

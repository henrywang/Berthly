name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow that's awkward or missing today.
      placeholder: When I have many stopped containers, I can't…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like Berthly to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other approaches, or how you work around it now (e.g. via the `container` CLI).
